<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0a0a0a" />

    <!-- Primary SEO -->
    <title>Granth Mittal — Freelance Web Developer | React, SaaS & E-Commerce</title>
    <meta
      name="description"
      content="Granth Mittal is a freelance web developer building fast, modern websites, SaaS apps, e-commerce stores & AI automation. Available for hire — view portfolio."
    />
    <meta name="keywords" content="freelance web developer, hire web developer, freelance React developer, freelance Next.js developer, SaaS developer, ecommerce website developer, AI automation developer, Granth Mittal" />
    <meta name="author" content="Granth Mittal" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1" />
    <link rel="canonical" href="https://granthmittal.com/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Granth Mittal" />
    <meta property="og:title" content="Granth Mittal — Freelance Web Developer" />
    <meta
      property="og:description"
      content="I build websites that work for your business — landing pages, SaaS, e-commerce & AI automation. Available for new projects."
    />
    <meta property="og:url" content="https://granthmittal.com/" />
    <meta property="og:image" content="https://granthmittal.com/og-image.jpg" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Granth Mittal — Freelance Web Developer" />
    <meta
      name="twitter:description"
      content="Freelance web developer building React, Next.js, SaaS, e-commerce & AI automation. Available for hire."
    />
    <meta name="twitter:image" content="https://granthmittal.com/og-image.jpg" />

    <!-- Structured Data: Person -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Granth Mittal",
      "url": "https://granthmittal.com",
      "jobTitle": "Freelance Web Developer",
      "knowsAbout": ["React", "Next.js", "TypeScript", "Node.js", "SaaS Development", "E-Commerce", "AI Automation", "Full Stack Development"],
      "worksFor": { "@type": "Organization", "name": "Freelance / Self-Employed" },
      "sameAs": [
        "https://github.com/granthmittal",
        "https://linkedin.com/in/granthmittal"
      ]
    }
    </script>

    <!-- Structured Data: ProfessionalService -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ProfessionalService",
      "name": "Granth Mittal — Web Development Services",
      "url": "https://granthmittal.com",
      "image": "https://granthmittal.com/og-image.jpg",
      "description": "Freelance web development services including landing pages, SaaS applications, e-commerce stores, and AI automation workflows for startups and businesses worldwide.",
      "provider": { "@type": "Person", "name": "Granth Mittal" },
      "areaServed": "Worldwide",
      "priceRange": "$$",
      "telephone": "+91-9602882318",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Web Development Services",
        "itemListElement": [
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "Landing Page Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "SaaS Application Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "E-Commerce Store Development" } },
          { "@type": "Offer", "itemOffered": { "@type": "Service", "name": "AI Automation Workflow" } }
        ]
      }
    }
    </script>

    <!-- Structured Data: FAQ -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "How much does a freelance web developer cost?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Pricing depends on your project's scope and complexity. Granth Mittal offers transparent project-based pricing — share your requirements on WhatsApp for a custom quote."
          }
        },
        {
          "@type": "Question",
          "name": "How long does it take to build a website?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "A typical website takes 2–6 weeks depending on complexity, content readiness, and revision rounds. Landing pages can be delivered in under 2 weeks."
          }
        },
        {
          "@type": "Question",
          "name": "What services do you offer?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Landing pages, SaaS web applications, e-commerce stores, and AI automation workflows — built with React, Next.js, and modern web technologies."
          }
        },
        {
          "@type": "Question",
          "name": "Do you work with international clients?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes — Granth Mittal works with clients worldwide and is available for remote freelance projects across all time zones."
          }
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
